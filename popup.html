<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AbordaAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ══════════════════════════════════════════
       MAIN VIEW
  ══════════════════════════════════════════ -->
  <div id="view-main">

    <!-- ── Header ────────────────────────────── -->
    <header class="header">
      <span class="logo-name">Aborda<span>AI</span></span>

      <div class="header-right">
        <!-- Job selector dropdown -->
        <div class="job-select-wrap">
          <select id="job-select" class="job-select">
            <option value="" disabled selected>Select a job…</option>
            <!-- populated by popup.js from API -->
          </select>
          <svg class="job-select-arrow" width="10" height="10" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
              clip-rule="evenodd" />
          </svg>
        </div>

        <!-- Settings trigger -->
        <button class="icon-btn" id="open-settings-btn" title="Settings">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z"
              clip-rule="evenodd" />
          </svg>
        </button>
      </div>
    </header>

    <!-- ── No job selected state ──────────────── -->
    <div id="no-job-state" class="empty-state">
      <div class="empty-state-icon">💼</div>
      <p class="empty-state-title">No job selected</p>
      <p class="empty-state-sub">Visit a LinkedIn job posting and it will appear in the dropdown automatically.</p>
    </div>

    <!-- ── Job loaded state ───────────────────── -->
    <div id="job-loaded-state" class="hidden">

      <!-- Job card -->
      <div class="section">
        <div class="job-card" id="job-card">
          <div class="job-card-top">
            <div class="job-logo" id="job-logo">🏢</div>
            <div class="job-card-info">
              <p class="job-title" id="job-title">—</p>
              <p class="job-company" id="job-company">—</p>
            </div>
            <div class="job-card-meta">
              <span class="job-tag" id="job-type">Full-time</span>
            </div>
          </div>
          <!-- Key requirements extracted by AI -->
          <div class="job-requirements" id="job-requirements">
            <span class="req-tag" id="req-1"></span>
            <span class="req-tag" id="req-2"></span>
            <span class="req-tag" id="req-3"></span>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- ── Chat detection banner ──────────────
           Shown automatically when a LinkedIn
           chat tab is detected as open          -->
      <div class="section" id="chat-banner-section">
        <div class="chat-banner hidden" id="chat-banner">
          <div class="chat-banner-left">
            <span class="chat-banner-dot"></span>
            <div>
              <p class="chat-banner-title">Chat detected</p>
              <p class="chat-banner-sub" id="chat-banner-name">Recruiter name</p>
            </div>
          </div>
          <span class="chat-banner-badge">Use message ↓</span>
        </div>
      </div>

      <!-- ── Message output ─────────────────────
           Always visible once a job is selected.
           Pre-generates on job select.          -->
      <div class="section" style="padding-top: 0;">
        <div class="output-box" id="output-box">
          <div class="output-header">
            <span class="output-header-label">Suggested Message</span>
            <div class="output-actions">
              <button class="action-btn" id="retry-btn">↺ New</button>
              <button class="action-btn copy" id="copy-btn">Copy</button>
            </div>
          </div>

          <!-- Skeleton shown while generating -->
          <div class="output-skeleton" id="output-skeleton">
            <div class="skeleton" style="width: 90%"></div>
            <div class="skeleton" style="width: 70%"></div>
            <div class="skeleton" style="width: 82%"></div>
            <div class="skeleton" style="width: 55%"></div>
          </div>

          <div class="output-text hidden" id="output-text"></div>

          <div class="output-footer">
            <span class="char-count" id="char-count">0 chars</span>
            <div class="char-track">
              <div class="char-bar-bg">
                <div class="char-bar-fill" id="char-bar-fill"></div>
              </div>
              <span class="char-max">/ 300</span>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- ── CTA ───────────────────────────────── -->
      <div class="section">
        <button class="generate-btn" id="find-recruiters-btn">
          <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
            <path
              d="M9 6a3 3 0 11-6 0 3 3 0 016 0zM17 6a3 3 0 11-6 0 3 3 0 016 0zM12.93 17c.046-.327.07-.66.07-1a6.97 6.97 0 00-1.5-4.33A5 5 0 0119 16v1h-6.07zM6 11a5 5 0 015 5v1H1v-1a5 5 0 015-5z" />
          </svg>
          <span id="find-btn-label">Find Recruiters at Company</span>
        </button>
      </div>

    </div>

    <!-- ── Footer ────────────────────────────── -->
    <footer class="app-footer">
      <div class="cv-status" id="cv-status" data-state="missing">
        <span class="cv-status-dot"></span>
        <span class="cv-status-label">No CV</span>
      </div>
    </footer>

  </div><!-- /view-main -->


  <!-- ══════════════════════════════════════════
       SETTINGS VIEW
  ══════════════════════════════════════════ -->
  <div id="view-settings" class="hidden">

    <header class="header">
      <button class="icon-btn" id="close-settings-btn" title="Back">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd"
            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
            clip-rule="evenodd" />
        </svg>
      </button>
      <span class="logo-name" style="font-size:13px;">Settings</span>
      <div style="width:24px"></div><!-- spacer -->
    </header>

    <!-- CV Upload -->
    <div class="section">
      <div class="label-row">
        <p class="section-label" style="margin-bottom:0">Your Resume / CV</p>
        <button class="clear-btn hidden" id="clear-resume-btn">✕ Remove</button>
      </div>

      <!-- Empty -->
      <div id="cv-empty-state">
        <label class="upload-area" for="resume-file-input">
          <span class="upload-icon">📄</span>
          <span class="upload-title">Upload your CV</span>
          <span class="upload-sub">PDF or TXT · max 2MB</span>
          <input type="file" id="resume-file-input" accept=".pdf,.txt" style="display:none" />
        </label>
      </div>

      <!-- Loaded -->
      <div class="saved-card hidden" id="cv-saved-state">
        <div class="saved-card-icon">📄</div>
        <div class="saved-card-info">
          <p class="saved-card-title" id="cv-file-name">—</p>
          <p class="saved-card-sub" id="cv-file-meta">—</p>
        </div>
        <span class="saved-badge">✓ Ready</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Danger zone -->
    <div class="section">
      <p class="section-label">Data</p>
      <button class="danger-btn" id="clear-all-btn">Clear all saved jobs & data</button>
    </div>

  </div><!-- /view-settings -->

  <script src="popup.js"></script>
</body>

</html>
